network:
  type: european_lv
  voltage_limits: [0.94, 1.06]
  line_loading_limit_percent: 100
  trafo_loading_limit_percent: 100

simulation:
  horizon_steps: 288
  dt_hours: 0.25
  seed: 2026

profiles:
  load_profile_csv: data/profiles/load_profile.csv
  pv_profile_csv: data/profiles/pv_profile.csv
  price_profile_csv: data/profiles/price_profile.csv

portfolio_events:
  - event_id: event_096_shift_f5_storage
    effective_step: 96
    der_id: ess_f5_99
    from_vpp_id: vpp_community_multi
    to_vpp_id: vpp_commercial_multi
    reason: "Day-2 slow portfolio agent leases downstream storage to the commercial VPP after repeated local flexibility awards."
  - event_id: event_192_shift_evcs
    effective_step: 192
    der_id: evcs_f2_35
    from_vpp_id: vpp_single_ev_hub
    to_vpp_id: vpp_commercial_multi
    reason: "Day-3 portfolio agent moves EV charging coordination into the commercial flexibility pool while keeping the physical charger bus unchanged."

vpps:
  - id: vpp_single_campus
    name: Single-PCC Campus VPP
    pcc_bus: 10
    privacy_mode: full_information
    portfolio_version: campus_v0
    zone_ids: [F1_zone_2]
    assets:
      pv:
        - id: pv_campus_10
          bus: 10
          p_max_mw: 0.055
          apparent_power_mva: 0.070
          zone_id: F1_zone_2
      storage:
        - id: ess_campus_10
          bus: 10
          capacity_mwh: 0.18
          soc: 0.52
          p_charge_max_mw: 0.040
          p_discharge_max_mw: 0.040
          zone_id: F1_zone_2
      flexible_load:
        - id: flex_campus_10
          bus: 10
          baseline_p_mw: 0.035
          p_min_mw: 0.012
          p_max_mw: 0.050
          zone_id: F1_zone_2
      hvac_aggregator:
        - id: hvac_campus_10
